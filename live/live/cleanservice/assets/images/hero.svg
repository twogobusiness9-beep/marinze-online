<svg viewBox="0 0 640 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Trusted home staffing and cleaning">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5f7fa"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="house" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#173257"/>
      <stop offset="1" stop-color="#102340"/>
    </linearGradient>
  </defs>
  <rect width="640" height="520" rx="24" fill="url(#bg)"/>
  <circle cx="536" cy="92" r="58" fill="#10b981" opacity="0.12"/>
  <circle cx="104" cy="432" r="70" fill="#102340" opacity="0.06"/>

  <!-- floor line -->
  <rect x="120" y="392" width="400" height="6" rx="3" fill="#dfe5ee"/>

  <!-- house -->
  <g transform="translate(206 150)">
    <path d="M114 0L228 92v6H0v-6z" fill="#10b981"/>
    <rect x="26" y="98" width="176" height="150" rx="10" fill="url(#house)"/>
    <rect x="52" y="132" width="52" height="52" rx="8" fill="#1e3f70"/>
    <rect x="124" y="132" width="52" height="52" rx="8" fill="#1e3f70"/>
    <rect x="92" y="196" width="44" height="52" rx="6" fill="#10b981"/>
  </g>

  <!-- trust badge / check -->
  <g transform="translate(392 250)">
    <circle cx="0" cy="0" r="46" fill="#ffffff" stroke="#dfe5ee" stroke-width="2"/>
    <circle cx="0" cy="0" r="34" fill="#10b981"/>
    <path d="M-14 0l9 10 19-20" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- sparkle -->
  <path d="M170 150l7 18 18 7-18 7-7 18-7-18-18-7 18-7z" fill="#10b981"/>
  <circle cx="470" cy="150" r="7" fill="#102340" opacity="0.3"/>
  <circle cx="150" cy="300" r="6" fill="#10b981" opacity="0.5"/>
</svg>

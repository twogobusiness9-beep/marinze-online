<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 390" width="520" height="390" role="img" aria-label="A guide observing children at work">
	<rect width="520" height="390" fill="#faf6ee"/>
	<rect x="0" y="300" width="520" height="90" fill="#eaddc9"/>
	<!-- window -->
	<rect x="40" y="40" width="150" height="120" rx="8" fill="#cfdcd5"/>
	<rect x="40" y="40" width="150" height="120" rx="8" fill="none" stroke="#7ea295" stroke-width="4"/>
	<line x1="115" y1="40" x2="115" y2="160" stroke="#7ea295" stroke-width="4"/>
	<line x1="40" y1="100" x2="190" y2="100" stroke="#7ea295" stroke-width="4"/>
	<!-- guide -->
	<circle cx="360" cy="150" r="34" fill="#3a362f"/>
	<rect x="326" y="184" width="68" height="96" rx="24" fill="#2f5d50"/>
	<!-- child at table -->
	<rect x="120" y="250" width="180" height="16" rx="6" fill="#c9704b"/>
	<rect x="130" y="266" width="12" height="40" fill="#b05a38"/>
	<rect x="278" y="266" width="12" height="40" fill="#b05a38"/>
	<circle cx="200" cy="215" r="26" fill="#55504a"/>
	<rect x="176" y="240" width="48" height="30" rx="12" fill="#d9a441"/>
	<!-- materials -->
	<rect x="150" y="232" width="20" height="18" fill="#7ea295"/>
	<rect x="230" y="232" width="20" height="18" fill="#2f5d50"/>
</svg>
